<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Testing onsubmit - complex</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="favicon.ico">
  <link href="assets/css/testing.css" rel="stylesheet">
  <style>
form {
  margin: 1em 0 0;
  padding: 0;
  background: none;
}

.error-notification {
  margin: 1em 0;
  padding: 1em;
  border: 1px solid rgb(200, 0, 0);
  background: #fff;
  font-size: .95em;
}

.error-notification h4 {
  margin: 0 0 1em;
  color: #000;
}

.error-notification ul {
  margin: 0;
  padding: 0;
  list-style: none;
}

.focus:focus {
  color: #000;
  outline: 0;
  animation: fade 5s forwards;
}

@keyframes fade {
  0% {
    background-color: #FFFF00;
  }
  100% {
    background-color: transparent;
  }
}

.input[aria-invalid="true"] {
  border: 1px solid rgb(200, 0, 0);
}

.input[aria-invalid="true"]:focus {
  border: 1px solid rgb(200, 0, 0);
  outline: 0;
  box-shadow: 0 0 0 2px #fff, 0 0 0 5px red;
}

.error-message {
  color: rgb(200, 0, 0);
}

.contact-details-heading {
  color: #000;
}
  </style>
</head>
<body>

<a class="intopia-home-link" href="https://intopia.digital/" aria-label="Intopia home">
  <img src="https://intopia.digital/wp-content/themes/intopia-refresh/assets/images/intopia.png" alt="Intopia logo" class="intopia-logo">
</a>

<h1>Testing onsubmit - complex</h1>

<p>Is the focus management of this page logical and intuitive?</p>

<div class="example">
  <h3 class="contact-details-heading">Contact details</h3>

  <div id="error-notification-container">
  </div>

  <form action="#" class="unstyled" id="contact-form">
    <div class="form-group-small">
      <label class="label" for="name">Name <span class="required">(Required)</span></label>
      <input class="input" type="text" id="name">
      <span id="name-error-container"></span>
    </div>

    <div class="form-group-small">
      <label class="label" for="address">Address</label>
      <input class="input" type="text" id="address">
    </div>

    <div class="form-group-small">
      <label class="label" for="email">Email <span class="required">(Required)</span></label>
      <input class="input" type="email" id="email">
      <span id="email-error-container"></span>
    </div>

    <div class="form-group-spaced">
      <label class="label" for="phone">Phone</label>
      <input class="input" type="tel" id="phone">
    </div>

    <button class="button" type="submit">Submit</button>
  </form>

</div>

<script>
document.getElementById('contact-form').addEventListener('submit', function (event) {
  event.preventDefault();

  // Replacing the container's content each time (rather than checking
  // for an existing #error node) means this works identically whether
  // it's the first submit attempt or the fifth.
  const errorContainer = document.getElementById('error-notification-container');
  errorContainer.innerHTML = `
    <div class="error-notification">
      <h4 id="error" class="focus" tabindex="-1">Error: Please fix the following two errors and resubmit the form</h4>
      <ul>
        <li><a href="#name">Name: You must include a name</a></li>
        <li><a href="#email">Email: You must use a valid email address</a></li>
      </ul>
    </div>
  `;
  document.getElementById('error').focus();

  const nameInput = document.getElementById('name');
  nameInput.setAttribute('aria-describedby', 'name-error');
  nameInput.setAttribute('aria-invalid', 'true');
  document.getElementById('name-error-container').innerHTML =
    '<span class="error-message" id="name-error">You must include a name</span>';

  const emailInput = document.getElementById('email');
  emailInput.setAttribute('aria-describedby', 'email-error');
  emailInput.setAttribute('aria-invalid', 'true');
  document.getElementById('email-error-container').innerHTML =
    '<span class="error-message" id="email-error">You must use a valid email address</span>';
});
</script>


<p class="footer-link"><a href="testing.html">Testing home</a></p>
</body>
</html>
