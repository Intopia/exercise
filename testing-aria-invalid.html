<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Testing aria-invalid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="favicon.ico">
  <link href="assets/css/testing.css" rel="stylesheet">
</head>
<body>

<a class="intopia-home-link" href="https://intopia.digital/" aria-label="Intopia website home">
  <img src="https://intopia.digital/wp-content/themes/intopia-refresh/assets/images/intopia.png" alt="Intopia" class="intopia-logo">
</a>

<h1>Testing <code>aria-invalid</code></h1>

<h2><code>aria-invalid="false"</code></h2>
<div class="example">
  <label class="label" for="aaa">Test</label>
  <input class="input" id="aaa" type="text" aria-invalid="false">
</div>

<h2><code>aria-invalid="true"</code></h2>
<div class="example">
  <label class="label" for="bbb">Test</label>
  <input class="input" id="bbb" type="text" aria-invalid="true">
</div>

<h2><code>aria-invalid="grammar"</code></h2>
<div class="example">
  <label class="label" for="ccc">Test</label>
  <input class="input" id="ccc" type="text" aria-invalid="grammar">
</div>

<h2><code>aria-invalid="spelling"</code></h2>
<div class="example">
  <label class="label" for="ddd">Test</label>
  <input class="input" id="ddd" type="text" aria-invalid="spelling">
</div>

<p class="footer-link"><a href="testing.html">Testing home</a></p>
</body>
</html>
